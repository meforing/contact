<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ВСТРЕЧА</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0d0d0d;
      --white: #f0ece4;
      --acid:  #c8f400;
      --red:   #e81500;
    }

    html, body {
      height: 100dvh;
      background: var(--white);
      color: var(--black);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── EMERGENCY 1/5 ── */
    .emergency {
      height: 20dvh;
      background: var(--red);
      flex-shrink: 0;
      border-bottom: 3px solid var(--black);
    }

    .emg-link {
      display: flex;
      height: 100%;
      align-items: center;
      text-decoration: none;
      padding: 0 24px;
      -webkit-tap-highlight-color: transparent;
      gap: 16px;
    }

    .emg-link:active { filter: brightness(0.82); }

    .emg-text { flex: 1; }

    .emg-eyebrow {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 5px;
    }

    .emg-title {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(22px, 6.5vw, 30px);
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      line-height: 1;
    }

    .emg-btn {
      background: #fff;
      color: var(--red);
      font-family: 'Unbounded', sans-serif;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 10px 14px;
      border: 3px solid var(--black);
      box-shadow: 4px 4px 0 var(--black);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── NAME BAND ── */
    .name-band {
      background: var(--black);
      color: var(--white);
      padding: 10px 24px;
      border-bottom: 3px solid var(--black);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-shrink: 0;
    }

    .name-text {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(18px, 5.5vw, 26px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.02em;
    }

    .name-tag {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--acid);
      text-transform: uppercase;
    }

    /* ── CARDS AREA ── */
    .cards {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 20px 24px;
      gap: 14px;
    }

    /* ── SINGLE BUTTON ── */
    .card-btn {
      display: flex;
      align-items: stretch;
      text-decoration: none;
      color: var(--black);
      border: 3px solid var(--black);
      box-shadow: 5px 5px 0 var(--black);
      background: var(--white);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s, box-shadow 0.08s, background 0.08s;
      cursor: pointer;
      height: 90px;
    }

    .card-btn:active {
      transform: translate(5px, 5px);
      box-shadow: 0 0 0 var(--black);
      background: var(--acid);
    }

    .btn-time {
      width: 100px;
      flex-shrink: 0;
      background: var(--black);
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 3px solid var(--black);
    }

    .btn-num {
      font-family: 'Unbounded', sans-serif;
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
    }

    .btn-unit {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.4;
      margin-top: 2px;
    }

    .btn-label {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0.02em;
      line-height: 1.15;
    }

    .btn-arrow {
      width: 44px;
      flex-shrink: 0;
      border-left: 3px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: var(--acid);
    }
  </style>
</head>
<body>
<div class="page">

  <!-- EMERGENCY 1/5 -->
  <div class="emergency">
    <a href="https://t.me/emergency_mikhail_bot" class="emg-link" target="_blank" rel="noopener">
      <div class="emg-text">
        <div class="emg-eyebrow">⚡ Экстренный контакт</div>
        <div class="emg-title">Telegram</div>
      </div>
      <div class="emg-btn">Написать</div>
    </a>
  </div>

  <!-- NAME BAND -->
  <div class="name-band">
    <div class="name-text">Михаил</div>
    <div class="name-tag">MEET · 2025</div>
  </div>

  <!-- BUTTONS -->
  <div class="cards">

    <a href="https://calendar.app.google/RAhYunDrTMcDChpn8" class="card-btn" target="_blank" rel="noopener">
      <div class="btn-time">
        <div class="btn-num">60</div>
        <div class="btn-unit">мин</div>
      </div>
      <div class="btn-label">Час твоего времени</div>
      <div class="btn-arrow">→</div>
    </a>

    <a href="https://calendar.app.google/cVXEUgjE627LVbNv6" class="card-btn" target="_blank" rel="noopener">
      <div class="btn-time">
        <div class="btn-num">30</div>
        <div class="btn-unit">мин</div>
      </div>
      <div class="btn-label">Без воды</div>
      <div class="btn-arrow">→</div>
    </a>

    <a href="https://calendar.app.google/ZffkDgr2B5jt9amWA" class="card-btn" target="_blank" rel="noopener">
      <div class="btn-time">
        <div class="btn-num">15</div>
        <div class="btn-unit">мин</div>
      </div>
      <div class="btn-label">Коротко и ясно</div>
      <div class="btn-arrow">→</div>
    </a>

  </div>

</div>
</body>
</html>
